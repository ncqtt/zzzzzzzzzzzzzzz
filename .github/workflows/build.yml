name: 🔨 Build Kernel — Samsung Galaxy A32 4G (M325F)

on:
  push:
    branches:
      - main
      - kernel-*
  workflow_dispatch:        # ← lets you trigger it manually from GitHub UI
    inputs:
      release:
        description: "Tag this as a release build?"
        required: false
        default: "false"

# ─────────────────────────────────────────────────────────────────────────────
#  ENVIRONMENT — put your secrets in:
#  GitHub → Repo → Settings → Secrets and variables → Actions → New secret
# ─────────────────────────────────────────────────────────────────────────────
env:
  DEVICE_NAME:   "Samsung Galaxy A32 4G"
  DEVICE_CODENAME: "M325F"
  ARCH:          "arm64"
  DEFCONFIG:     "m325f_defconfig"        # adjust if your defconfig differs
  KERNEL_DIR:    "kernel"                 # folder where your kernel source lives
  ANYKERNEL_DIR: "AnyKernel3"
  CLANG_VERSION: "r522817"               # latest stable Google Clang
  OUTPUT_DIR:    "out"

  # ── Telegram (set these as GitHub Secrets, never hardcode!) ──
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}   # BotFather token
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }} # your group/channel ID

jobs:
  build:
    name: 🏗️ Kernel Build
    runs-on: ubuntu-latest
    timeout-minutes: 120     # kills the job if it hangs for 2 hours

    steps:

    # ── 0. CLEANUP — free up disk space on the GitHub runner ──────────────────
    - name: 🧹 Remove bloat from GitHub runner
      run: |
        echo "▶ Disk before cleanup:"
        df -h /

        # Remove large pre-installed packages we don't need
        sudo apt-get purge -y \
          '^dotnet-.*' '^llvm-.*' '^php.*' '^mongodb.*' '^mysql.*' \
          azure-cli google-cloud-cli google-chrome-stable firefox \
          powershell mono-devel libgl1-mesa-dri snapd \
          --fix-missing || true

        # Remove heavy pre-installed directories
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /opt/hostedtoolcache/CodeQL \
          /usr/local/share/boost \
          "$AGENT_TOOLSDIRECTORY"

        sudo apt-get autoremove -y
        sudo apt-get autoclean -y

        echo "▶ Disk after cleanup:"
        df -h /

    # ── 1. NOTIFY — build started ─────────────────────────────────────────────
    - name: 📨 Telegram — Build Started
      run: |
        BUILD_TIME=$(date "+%Y-%m-%d %H:%M UTC")
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d parse_mode="HTML" \
          -d text="$(cat <<EOF
        🔨 <b>Kernel Build Started</b>

        📱 Device : <code>${DEVICE_NAME} (${DEVICE_CODENAME})</code>
        🌿 Branch : <code>${GITHUB_REF_NAME}</code>
        💬 Commit : <code>${GITHUB_SHA::8}</code>
        🕐 Time   : <code>${BUILD_TIME}</code>
        🤖 Runner : <code>ubuntu-latest</code>

        ⏳ Building... please wait.
        EOF
        )"

    # ── 2. CHECKOUT — your kernel source ─────────────────────────────────────
    - name: 📥 Checkout kernel source
      uses: actions/checkout@v4
      with:
        path: ${{ env.KERNEL_DIR }}
        fetch-depth: 1          # shallow clone = faster

    # ── 3. CHECKOUT — AnyKernel3 for packaging ────────────────────────────────
    - name: 📥 Checkout AnyKernel3
      uses: actions/checkout@v4
      with:
        repository: osm0sis/AnyKernel3   # replace with your own fork if needed
        path: ${{ env.ANYKERNEL_DIR }}
        fetch-depth: 1

    # ── 4. DEPENDENCIES — install build essentials ────────────────────────────
    - name: 📦 Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          bc bison build-essential ca-certificates ccache cpio curl \
          flex git kmod libelf-dev libssl-dev lz4 python3 \
          schedtool zip zstd

    # ── 5. TOOLCHAIN — Google Clang ───────────────────────────────────────────
    - name: 🛠️ Download Google Clang toolchain
      run: |
        mkdir -p clang
        curl -sL \
          "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${CLANG_VERSION}.tar.gz" \
          -o clang.tar.gz
        tar -C clang -xzf clang.tar.gz
        rm clang.tar.gz
        echo "CLANG_PATH=$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_ENV

    # ── 6. CCACHE — speed up repeat builds ───────────────────────────────────
    - name: ⚡ Set up ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key:  ccache-a32-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ccache-a32-${{ github.ref_name }}-
          ccache-a32-

    - name: ⚡ Configure ccache
      run: |
        ccache --max-size=4G
        ccache --zero-stats
        echo "USE_CCACHE=1"    >> $GITHUB_ENV
        echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

    # ── 7. BUILD ──────────────────────────────────────────────────────────────
    - name: 🔨 Build kernel
      working-directory: ${{ env.KERNEL_DIR }}
      run: |
        export PATH="${CLANG_PATH}:${PATH}"

        MAKE_FLAGS=(
          -j$(nproc --all)
          O=../${OUTPUT_DIR}
          ARCH=${ARCH}
          CC="ccache clang"
          CLANG_TRIPLE="aarch64-linux-gnu-"
          CROSS_COMPILE="aarch64-linux-gnu-"
          CROSS_COMPILE_ARM32="arm-linux-gnueabi-"
          LLVM=1
          LLVM_IAS=1
        )

        echo "▶ Generating defconfig: ${DEFCONFIG}"
        make "${MAKE_FLAGS[@]}" ${DEFCONFIG}

        echo "▶ Starting kernel compile ($(nproc --all) threads)"
        START_TIME=$(date +%s)
        make "${MAKE_FLAGS[@]}" 2>&1 | tee ../build.log
        END_TIME=$(date +%s)

        ELAPSED=$(( END_TIME - START_TIME ))
        echo "BUILD_SECONDS=${ELAPSED}" >> $GITHUB_ENV
        echo "Build finished in ${ELAPSED}s"

    # ── 8. PACKAGE — zip with AnyKernel3 ─────────────────────────────────────
    - name: 📦 Package flashable ZIP
      run: |
        TIMESTAMP=$(date "+%Y%m%d-%H%M")
        ZIP_NAME="Kernel-A32-4G-${TIMESTAMP}.zip"
        echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

        # Copy the Image to AnyKernel folder (adjust path if needed)
        cp ${OUTPUT_DIR}/arch/${ARCH}/boot/Image ${ANYKERNEL_DIR}/
        # Also copy dtb/dtbo if your device needs them:
        # cp ${OUTPUT_DIR}/arch/${ARCH}/boot/dts/**/*.dtb  ${ANYKERNEL_DIR}/dtb
        # cp ${OUTPUT_DIR}/arch/${ARCH}/boot/dtbo.img      ${ANYKERNEL_DIR}/

        cd ${ANYKERNEL_DIR}
        zip -r9 ../${ZIP_NAME} . -x "*.git*" "*.github*"
        cd ..

        echo "ZIP_SIZE=$(du -sh ${ZIP_NAME} | cut -f1)" >> $GITHUB_ENV

    # ── 9. UPLOAD — GitHub artifact (7 day retention) ────────────────────────
    - name: ☁️ Upload ZIP to GitHub artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ env.ZIP_NAME }}
        retention-days: 7

    # ── 10. NOTIFY — build succeeded ─────────────────────────────────────────
    - name: 📨 Telegram — Build Succeeded ✅
      if: success()
      run: |
        MINS=$(( BUILD_SECONDS / 60 ))
        SECS=$(( BUILD_SECONDS % 60 ))
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d parse_mode="HTML" \
          -d text="$(cat <<EOF
        ✅ <b>Kernel Build Succeeded!</b>

        📱 Device  : <code>${DEVICE_NAME} (${DEVICE_CODENAME})</code>
        🌿 Branch  : <code>${GITHUB_REF_NAME}</code>
        💬 Commit  : <code>${GITHUB_SHA::8}</code>
        ⏱ Duration : <code>${MINS}m ${SECS}s</code>
        📦 ZIP     : <code>${ZIP_NAME}</code>  (${ZIP_SIZE})
        🔗 Actions : <a href="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}">View run</a>

        🎉 Flash it and enjoy!
        EOF
        )"

    # ── 11. UPLOAD — send ZIP directly to Telegram (≤50 MB) ──────────────────
    - name: 📨 Telegram — Send ZIP file
      if: success()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument" \
          -F chat_id="${TELEGRAM_CHAT_ID}" \
          -F document=@"${ZIP_NAME}" \
          -F caption="🔨 ${DEVICE_NAME} kernel build — ${GITHUB_REF_NAME}@${GITHUB_SHA::8}"

    # ── 12. NOTIFY — build failed ─────────────────────────────────────────────
    - name: 📨 Telegram — Build Failed ❌
      if: failure()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d parse_mode="HTML" \
          -d text="$(cat <<EOF
        ❌ <b>Kernel Build Failed!</b>

        📱 Device : <code>${DEVICE_NAME} (${DEVICE_CODENAME})</code>
        🌿 Branch : <code>${GITHUB_REF_NAME}</code>
        💬 Commit : <code>${GITHUB_SHA::8}</code>
        🔗 Logs   : <a href="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}">View logs</a>

        😢 Check the logs above for errors.
        EOF
        )"

    # ── 13. CCACHE stats (helpful for debugging cache hits) ───────────────────
    - name: 📊 ccache stats
      if: always()
      run: ccache --show-stats
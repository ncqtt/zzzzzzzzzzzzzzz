workflow_dispatch:
    inputs:

      # ── Device info ──────────────────────────────────────────────────────
      device_name:
        description: "Device name"
        required: true
        default: "Samsung Galaxy A32 4G"

      device_codename:
        description: "Device codename"
        required: true
        default: "SM-A325F"

      # ── Kernel source ─────────────────────────────────────────────────────
      kernel_repo:
        description: "Kernel source repo (user/repo or full URL)"
        required: true
        default: "YOUR_USERNAME/android_kernel_samsung_a32"

      kernel_branch:
        description: "Kernel source branch"
        required: true
        default: "main"

      # ── Architecture ──────────────────────────────────────────────────────
      arch:
        description: "Target architecture"
        required: true
        default: "arm64"
        type: choice
        options:
          - arm64
          - arm

      # ── Defconfig ─────────────────────────────────────────────────────────
      defconfig:
        description: "Defconfig name (inside arch/<ARCH>/configs/)"
        required: true
        default: "a32_defconfig"

      extra_configs:
        description: "Extra config fragments to merge, space-separated"
        required: false
        default: ""

      # ── Toolchain ─────────────────────────────────────────────────────────
      toolchain:
        description: "Toolchain to use"
        required: true
        default: "google-clang"
        type: choice
        options:
          - google-clang
          - proton-clang
          - neutron-clang
          - aosp-clang
          - gcc-only

      clang_version:
        description: "Google Clang version tag (only for google-clang, e.g. r522817)"
        required: false
        default: "r522817"

      custom_clang_repo:
        description: "Custom Clang repo URL (for proton/neutron/aosp — leave empty to auto-resolve)"
        required: false
        default: ""

      use_llvm:
        description: "Use LLVM linker (LLVM=1 LLVM_IAS=1)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      # ── GCC cross-compile ─────────────────────────────────────────────────
      # MERGED: Provide both as "gcc64_url gcc32_url" space-separated, or leave empty
      gcc_repos:
        description: "GCC repo URLs: 'aarch64_repo arm32_repo' space-separated (leave empty for apt gcc)"
        required: false
        default: ""

      # ── ccache ────────────────────────────────────────────────────────────
      ccache_size:
        description: "ccache max size (e.g. 4G, 8G)"
        required: false
        default: "5G"

      # ── AnyKernel3 ────────────────────────────────────────────────────────
      anykernel_repo:
        description: "AnyKernel3 repo (user/repo or full URL)"
        required: true
        default: "osm0sis/AnyKernel3"

      anykernel_branch:
        description: "AnyKernel3 branch"
        required: false
        default: "master"

      # ── Boot image artifacts ───────────────────────────────────────────────
      include_dtb:
        description: "Include DTB in ZIP"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      include_dtbo:
        description: "Include DTBO image in ZIP"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      image_name:
        description: "Kernel image name"
        required: false
        default: "Image"
        type: choice
        options:
          - Image
          - Image.gz
          - Image.gz-dtb
          - Image-dtb

      # ── ZIP / output ──────────────────────────────────────────────────────
      zip_prefix:
        description: "ZIP filename prefix (e.g. 'Kernel' → Kernel-A32-20250418.zip)"
        required: false
        default: "Kernel"

      # ── Release ───────────────────────────────────────────────────────────
      create_release:
        description: "Create a GitHub Release and attach the ZIP"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      release_tag:
        description: "Release tag (e.g. v1.0.0 — only used if create_release=true)"
        required: false
        default: ""

      # ── Telegram ──────────────────────────────────────────────────────────
      send_zip_telegram:
        description: "Upload ZIP directly to Telegram chat (≤50 MB)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
